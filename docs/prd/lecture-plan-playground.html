<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Humax AX 강의 계획 튜너</title>
<style>
  :root{
    --bg:#0d1117; --panel:#161b22; --panel2:#1c2230; --line:#2d3340;
    --txt:#e6edf3; --dim:#8b949e; --dim2:#6e7681;
    --accent:#58a6ff; --accent2:#1f6feb;
    --intro:#6b7280; --d:#3b82f6; --r:#a855f7; --dr:#8b5cf6; --i:#10b981; --web:#f59e0b;
    --warn:#f0883e; --ok:#3fb950;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    background:var(--bg); color:var(--txt);
    font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Segoe UI",Roboto,"Noto Sans KR",sans-serif;
    font-size:13px; line-height:1.5; overflow:hidden;
  }
  .mono{font-family:"SF Mono",ui-monospace,Menlo,Consolas,monospace}
  .app{display:grid; grid-template-columns:340px 1fr; height:100vh}

  /* ---- sidebar ---- */
  .side{background:var(--panel); border-right:1px solid var(--line); overflow-y:auto; padding:16px 16px 40px}
  .side::-webkit-scrollbar{width:8px} .side::-webkit-scrollbar-thumb{background:#30363d;border-radius:4px}
  .brand{font-size:15px; font-weight:700; letter-spacing:-.2px}
  .brand small{display:block; color:var(--dim); font-weight:400; font-size:11px; margin-top:3px}

  .grp{margin-top:20px}
  .grp h3{font-size:11px; text-transform:uppercase; letter-spacing:.7px; color:var(--dim2); margin-bottom:9px; font-weight:600}

  .seg{display:flex; gap:4px; background:var(--bg); padding:3px; border-radius:8px; border:1px solid var(--line)}
  .seg button{flex:1; background:none; border:none; color:var(--dim); padding:7px 4px; border-radius:6px; cursor:pointer; font-size:12px; font-weight:500; transition:.12s}
  .seg button:hover{color:var(--txt)}
  .seg button.on{background:var(--accent2); color:#fff}

  .slider-row{display:flex; align-items:center; justify-content:space-between; margin-bottom:6px}
  .slider-row .v{font-size:11px; color:var(--accent)}
  input[type=range]{width:100%; -webkit-appearance:none; height:4px; background:var(--line); border-radius:3px; outline:none}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none; width:15px; height:15px; border-radius:50%; background:var(--accent); cursor:pointer; border:2px solid var(--panel)}
  .scale{display:flex; justify-content:space-between; color:var(--dim2); font-size:10px; margin-top:3px}

  .presets{display:grid; grid-template-columns:1fr 1fr; gap:6px}
  .presets button{background:var(--panel2); border:1px solid var(--line); color:var(--txt); padding:8px 6px; border-radius:7px; cursor:pointer; font-size:11px; text-align:left; transition:.12s; line-height:1.25}
  .presets button:hover{border-color:var(--accent); background:#202838}
  .presets button b{display:block; font-size:11.5px}
  .presets button span{color:var(--dim); font-size:10px}

  .modlist{display:flex; flex-direction:column; gap:3px}
  .modlist .sx{font-size:10px; color:var(--dim2); margin:7px 0 2px; font-weight:600}
  .chk{display:flex; align-items:center; gap:7px; padding:4px 6px; border-radius:6px; cursor:pointer; transition:.1s}
  .chk:hover{background:var(--panel2)}
  .chk .box{width:14px; height:14px; border-radius:4px; border:1.5px solid var(--dim2); flex:0 0 auto; display:flex; align-items:center; justify-content:center; font-size:10px}
  .chk.on .box{background:var(--ok); border-color:var(--ok); color:#0d1117}
  .chk .nm{font-size:11.5px; color:var(--dim); flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
  .chk.on .nm{color:var(--txt)}
  .chk .mn{font-size:10px; color:var(--dim2)}
  .chk .dot{width:6px;height:6px;border-radius:50%;flex:0 0 auto}

  .chips{display:flex; flex-wrap:wrap; gap:5px}
  .chip{background:var(--panel2); border:1px solid var(--line); color:var(--dim); padding:5px 9px; border-radius:14px; cursor:pointer; font-size:11px; transition:.1s; user-select:none}
  .chip:hover{color:var(--txt)}
  .chip.on{background:#13331f; border-color:var(--ok); color:var(--ok)}

  /* ---- main ---- */
  .main{display:flex; flex-direction:column; overflow:hidden}
  .board{flex:1; overflow:auto; padding:18px 20px}
  .board::-webkit-scrollbar{height:8px;width:8px} .board::-webkit-scrollbar-thumb{background:#30363d;border-radius:4px}
  .board-top{display:flex; align-items:baseline; justify-content:space-between; margin-bottom:14px; flex-wrap:wrap; gap:8px}
  .board-top h2{font-size:14px; font-weight:600}
  .legend{display:flex; gap:12px; flex-wrap:wrap}
  .legend span{display:flex; align-items:center; gap:5px; font-size:11px; color:var(--dim)}
  .legend i{width:9px; height:9px; border-radius:2px; display:inline-block}

  .cols{display:grid; grid-template-columns:repeat(5,1fr); gap:10px; min-width:1000px}
  .col{background:var(--panel); border:1px solid var(--line); border-radius:10px; padding:10px; display:flex; flex-direction:column}
  .col-h{margin-bottom:8px}
  .col-h .t{font-size:12px; font-weight:700; line-height:1.3}
  .col-h .s{font-size:10px; color:var(--dim); margin-top:2px}
  .col-time{display:flex; align-items:baseline; gap:6px; margin-top:6px}
  .col-time b{font-size:18px} .col-time .u{font-size:10px;color:var(--dim)}
  .col-time .delta{font-size:10px; margin-left:auto; padding:1px 6px; border-radius:10px}
  .prbar{height:5px; border-radius:3px; background:var(--line); margin:7px 0 9px; overflow:hidden; display:flex}
  .prbar i{height:100%; background:var(--accent)}
  .prlbl{display:flex; justify-content:space-between; font-size:9.5px; color:var(--dim2); margin-top:-6px; margin-bottom:6px}

  .blocks{display:flex; flex-direction:column; gap:4px}
  .blk{border-radius:6px; padding:6px 8px; position:relative; overflow:hidden; border-left:3px solid; transition:.12s}
  .blk .bn{font-size:11px; font-weight:500; line-height:1.25}
  .blk .bm{font-size:10px; opacity:.85; margin-top:2px}
  .blk.off{opacity:.32; border-style:dashed; border-left-style:dashed}
  .blk.off .bn{text-decoration:line-through}

  /* ---- prompt ---- */
  .prompt{border-top:1px solid var(--line); background:var(--panel); padding:12px 20px 14px; flex:0 0 auto}
  .prompt-h{display:flex; align-items:center; justify-content:space-between; margin-bottom:8px}
  .prompt-h h3{font-size:12px; color:var(--dim); font-weight:600; text-transform:uppercase; letter-spacing:.5px}
  .copy{background:var(--accent2); border:none; color:#fff; padding:7px 16px; border-radius:7px; cursor:pointer; font-size:12px; font-weight:600; transition:.12s}
  .copy:hover{background:var(--accent)}
  .copy.done{background:var(--ok)}
  .out{background:var(--bg); border:1px solid var(--line); border-radius:8px; padding:12px 14px; max-height:168px; overflow-y:auto; font-size:12px; line-height:1.65; white-space:pre-wrap; color:#c9d1d9}
  .out::-webkit-scrollbar{width:8px} .out::-webkit-scrollbar-thumb{background:#30363d;border-radius:4px}
</style>
</head>
<body>
<div class="app">
  <!-- SIDEBAR -->
  <aside class="side">
    <div class="brand">Humax AX 강의 계획 튜너
      <small>4회 커리큘럼을 대상·페이스·범위에 맞게 조정 → 수정 지시문 생성</small>
    </div>

    <div class="grp">
      <h3>프리셋</h3>
      <div class="presets" id="presets"></div>
    </div>

    <div class="grp">
      <h3>대상 수준</h3>
      <div class="seg" id="audSeg"></div>
    </div>

    <div class="grp">
      <h3>강의 페이스</h3>
      <div class="seg" id="paceSeg"></div>
    </div>

    <div class="grp">
      <div class="slider-row"><h3 style="margin:0">실습 비중</h3><span class="v" id="prVal">60%</span></div>
      <input type="range" id="prSlider" min="0" max="100" step="5" value="60">
      <div class="scale"><span>이론 중심</span><span>실습 중심</span></div>
    </div>

    <div class="grp">
      <h3>모듈 포함 / 제외</h3>
      <div class="modlist" id="modlist"></div>
    </div>

    <div class="grp">
      <h3>우선 산출물 (must-have)</h3>
      <div class="chips" id="delivChips"></div>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main">
    <div class="board">
      <div class="board-top">
        <h2>커리큘럼 미리보기 <span class="mono" id="grand" style="color:var(--dim);font-size:12px"></span></h2>
        <div class="legend">
          <span><i style="background:var(--intro)"></i>인트로</span>
          <span><i style="background:var(--d)"></i>D 데스크탑</span>
          <span><i style="background:var(--r)"></i>R 리모트</span>
          <span><i style="background:var(--i)"></i>I 코드</span>
          <span><i style="background:var(--web)"></i>Web 풀스택</span>
        </div>
      </div>
      <div class="cols" id="cols"></div>
    </div>

    <div class="prompt">
      <div class="prompt-h">
        <h3>생성된 수정 지시문</h3>
        <button class="copy" id="copyBtn">프롬프트 복사</button>
      </div>
      <div class="out" id="out"></div>
    </div>
  </main>
</div>

<script>
// ---------------- DATA (docs/prd/humax-lecture-plan-v2.md 에서 추출) ----------------
const STAGE = {intro:'--intro', D:'--d', R:'--r', DR:'--dr', I:'--i', web:'--web'};
const stageColor = s => getComputedStyle(document.documentElement).getPropertyValue(STAGE[s]).trim();

const SESSIONS = [
  {id:1, t:'1회차 · Claude Desktop 풀활용', s:'DRI: D + R 일부', mods:[
    {id:'1-1', nm:'DRI 모델 소개', min:15, stage:'intro', tag:'foundational'},
    {id:'1-2', nm:'Chat vs Cowork', min:20, stage:'D', tag:'core'},
    {id:'1-3', nm:'7대 기능 시연 (MCP·Schedule·Dispatch 등)', min:45, stage:'DR', tag:'core'},
    {id:'1-4', nm:'Extension (Chrome·Word·Excel·PPT)', min:30, stage:'D', tag:'core'},
  ]},
  {id:2, t:'2회차 · Claude Code 본격 도입', s:'DRI: I', mods:[
    {id:'2-1', nm:'실행 환경 비교', min:15, stage:'I', tag:'core'},
    {id:'2-2', nm:'필수 프로그램 설치', min:25, stage:'I', tag:'foundational'},
    {id:'2-3', nm:'OMC 설치', min:20, stage:'I', tag:'core'},
    {id:'2-4', nm:'PRD 개념', min:20, stage:'I', tag:'foundational'},
    {id:'2-5', nm:'멀티 모델 리뷰 (CCG)', min:30, stage:'I', tag:'advanced'},
    {id:'2-6', nm:'숙제 안내', min:10, stage:'I', tag:'core'},
  ]},
  {id:3, t:'3회차 · Playground·Git·환경변수·API·MCP', s:'DRI: I 응용', mods:[
    {id:'3-1', nm:'Playground 스킬 소개', min:10, stage:'I', tag:'core'},
    {id:'3-2', nm:'Git 개념 (clone·commit·push)', min:10, stage:'I', tag:'foundational'},
    {id:'3-3', nm:'GitHub 소개 (repo·.gitignore)', min:10, stage:'I', tag:'foundational'},
    {id:'3-4', nm:'환경변수 관리 (.env)', min:15, stage:'I', tag:'core'},
    {id:'3-5', nm:'API 개념 소개 (REST·인증)', min:15, stage:'I', tag:'foundational'},
    {id:'3-6', nm:'MCP 테스트 = 로그 파일 분석', min:15, stage:'I', tag:'core'},
    {id:'3-7', nm:'data.go.kr 가입·키 발급', min:10, stage:'I', tag:'core'},
    {id:'3-8', nm:'환율 조회 실습 (수출입은행 API)', min:20, stage:'I', tag:'core'},
  ]},
  {id:4, t:'4회차 · 하네스·SAP·SQL·DB·Supabase·RAG', s:'DRI: I 데이터', mods:[
    {id:'4-1', nm:'하네스 설정 (CLAUDE.md·AGENTS.md)', min:15, stage:'I', tag:'foundational'},
    {id:'4-2', nm:'SAP OData 소개', min:15, stage:'I', tag:'advanced'},
    {id:'4-3', nm:'SQL 소개 (SELECT·JOIN)', min:30, stage:'I', tag:'foundational'},
    {id:'4-4', nm:'로컬 DB (SQLite)', min:25, stage:'I', tag:'core'},
    {id:'4-5', nm:'Supabase 연결 (테이블·RLS)', min:35, stage:'I', tag:'core'},
    {id:'4-6', nm:'Supabase 데이터 적재 실습', min:30, stage:'I', tag:'advanced'},
    {id:'4-7', nm:'Embedding·RAG (pgvector)', min:30, stage:'I', tag:'advanced'},
  ]},
  {id:5, t:'5회차 · Vercel·웹·E2E 테스트', s:'DRI: I 풀스택', mods:[
    {id:'5-1', nm:'Next.js·웹 화면 소개', min:25, stage:'web', tag:'advanced'},
    {id:'5-2', nm:'Vercel 배포 (GitHub 연결)', min:25, stage:'web', tag:'core'},
    {id:'5-3', nm:'console.log 디버깅 (Console·Network)', min:20, stage:'web', tag:'foundational'},
    {id:'5-4', nm:'Playwright 사용법', min:25, stage:'web', tag:'advanced'},
    {id:'5-5', nm:'E2E 테스트 작성', min:25, stage:'web', tag:'core'},
  ]},
];
const ALLMODS = SESSIONS.flatMap(s=>s.mods);

const DELIVERABLES = ['Cowork Project','MCP 활용 + 로그 분석','Extension 4종','VS Code 환경','PRD + ralplan',
  'GitHub repo + .env','data.go.kr 환율 스크립트','SQL/Supabase DB','Vercel 배포 URL','Playwright E2E 테스트'];

const AUD = {
  beginner:{label:'완전 초보', foundational:1.3, advanced:0.7, core:1.0},
  some:    {label:'약간 경험', foundational:1.0, advanced:1.0, core:1.0},
  mid:     {label:'개발 경험', foundational:0.65,advanced:1.15,core:1.0},
};
const PACE = {relaxed:{label:'여유', m:1.25}, std:{label:'표준', m:1.0}, intensive:{label:'집중', m:0.8}};

const DEFAULTS = {audience:'some', pace:'std', practice:60};
const PXMIN = 3;

// ---------------- STATE ----------------
const state = {
  audience:'some', pace:'std', practice:60,
  excluded:new Set(),
  priorities:new Set(),
};

const PRESETS = {
  beginner:{label:'완전 초보반', desc:'설치·기초 ↑ / 고급 ↓', st:{audience:'beginner', pace:'relaxed', practice:55, excluded:[], priorities:[]}},
  sprint:  {label:'속성 집중반', desc:'압축 + 실습 위주', st:{audience:'some', pace:'intensive', practice:80, excluded:[], priorities:[]}},
  dev:     {label:'개발 경험자반', desc:'설치·기초 축소 / 후반 ↑', st:{audience:'mid', pace:'std', practice:70, excluded:['2-2','3-2','3-3'], priorities:[]}},
  desktop: {label:'데스크탑 1일', desc:'1회차만 (2~5 제외)', st:{audience:'beginner', pace:'std', practice:60,
            excluded:SESSIONS.slice(1).flatMap(s=>s.mods.map(m=>m.id)), priorities:['Cowork Project','MCP 활용 + 로그 분석','Extension 4종']}},
  fullstack:{label:'풀스택 자동화', desc:'웹 배포 끝까지', st:{audience:'mid', pace:'std', practice:75, excluded:[],
            priorities:['MCP 활용 + 로그 분석','GitHub repo + .env','SQL/Supabase DB','Vercel 배포 URL','Playwright E2E 테스트']}},
};

// ---------------- COMPUTE ----------------
function factor(m){ return PACE[state.pace].m * AUD[state.audience][m.tag]; }
function scaled(m){ return m.min * factor(m); }
function sessionTotal(sess){
  return sess.mods.filter(m=>!state.excluded.has(m.id)).reduce((a,m)=>a+scaled(m),0);
}

// ---------------- RENDER: BOARD ----------------
function renderBoard(){
  const cols = document.getElementById('cols');
  cols.innerHTML = '';
  let grand=0;
  SESSIONS.forEach(sess=>{
    const total = sessionTotal(sess); grand+=total;
    const delta = total-120;
    const dCol = Math.abs(delta)<=12 ? 'var(--ok)' : (Math.abs(delta)<=25?'var(--warn)':'#f85149');
    const dBg  = Math.abs(delta)<=12 ? 'rgba(63,185,80,.15)' : (Math.abs(delta)<=25?'rgba(240,136,62,.15)':'rgba(248,81,73,.15)');
    const pr = state.practice;
    const col = document.createElement('div'); col.className='col';
    let blocks='';
    sess.mods.forEach(m=>{
      const off = state.excluded.has(m.id);
      const sc = scaled(m);
      const h = off ? 24 : Math.max(30, sc*PXMIN);
      const c = stageColor(m.stage);
      blocks += `<div class="blk${off?' off':''}" data-id="${m.id}" title="클릭: 포함/제외 토글"
        style="height:${h}px; background:${hexA(c,off?0.08:0.16)}; border-left-color:${c}; cursor:pointer">
        <div class="bn">${m.id} · ${m.nm}</div>
        <div class="bm mono">${off?'제외':Math.round(sc)+'분'}${(!off&&Math.round(sc)!==m.min)?` <span style="opacity:.6">(기본 ${m.min})</span>`:''}</div>
      </div>`;
    });
    col.innerHTML = `
      <div class="col-h">
        <div class="t">${sess.t}</div>
        <div class="s">${sess.s}</div>
        <div class="col-time">
          <b class="mono">${Math.round(total)}</b><span class="u">분 / 120분</span>
          <span class="delta mono" style="color:${dCol};background:${dBg}">${delta>=0?'+':''}${Math.round(delta)}</span>
        </div>
        <div class="prbar"><i style="width:${pr}%"></i></div>
        <div class="prlbl"><span>실습 ${pr}%</span><span>이론 ${100-pr}%</span></div>
      </div>
      <div class="blocks">${blocks}</div>`;
    cols.appendChild(col);
  });
  document.getElementById('grand').textContent = `· 총 ${Math.round(grand)}분 (기준 600분)`;
  cols.querySelectorAll('.blk').forEach(b=>b.onclick=()=>toggleMod(b.dataset.id));
}
function hexA(hex,a){
  hex=hex.replace('#',''); if(hex.length===3) hex=hex.split('').map(x=>x+x).join('');
  const r=parseInt(hex.slice(0,2),16),g=parseInt(hex.slice(2,4),16),b=parseInt(hex.slice(4,6),16);
  return `rgba(${r},${g},${b},${a})`;
}

// ---------------- RENDER: SIDEBAR ----------------
function renderSeg(elId, map, key){
  const el=document.getElementById(elId); el.innerHTML='';
  Object.entries(map).forEach(([k,v])=>{
    const b=document.createElement('button'); b.textContent=v.label;
    if(state[key]===k) b.className='on';
    b.onclick=()=>{ state[key]=k; updateAll(); };
    el.appendChild(b);
  });
}
function renderModlist(){
  const el=document.getElementById('modlist'); el.innerHTML='';
  SESSIONS.forEach(sess=>{
    const sx=document.createElement('div'); sx.className='sx'; sx.textContent=sess.t.split(' · ')[0]+' — '+sess.t.split(' · ')[1];
    el.appendChild(sx);
    sess.mods.forEach(m=>{
      const on=!state.excluded.has(m.id);
      const row=document.createElement('div'); row.className='chk'+(on?' on':'');
      row.innerHTML=`<span class="box">${on?'✓':''}</span>
        <span class="dot" style="background:${stageColor(m.stage)}"></span>
        <span class="nm">${m.id} ${m.nm}</span><span class="mn mono">${m.min}'</span>`;
      row.onclick=()=>toggleMod(m.id);
      el.appendChild(row);
    });
  });
}
function renderChips(){
  const el=document.getElementById('delivChips'); el.innerHTML='';
  DELIVERABLES.forEach(d=>{
    const on=state.priorities.has(d);
    const c=document.createElement('div'); c.className='chip'+(on?' on':''); c.textContent=d;
    c.onclick=()=>{ on?state.priorities.delete(d):state.priorities.add(d); updateAll(); };
    el.appendChild(c);
  });
}
function renderPresets(){
  const el=document.getElementById('presets'); el.innerHTML='';
  Object.values(PRESETS).forEach(p=>{
    const b=document.createElement('button');
    b.innerHTML=`<b>${p.label}</b><span>${p.desc}</span>`;
    b.onclick=()=>applyPreset(p);
    el.appendChild(b);
  });
}
function applyPreset(p){
  state.audience=p.st.audience; state.pace=p.st.pace; state.practice=p.st.practice;
  state.excluded=new Set(p.st.excluded); state.priorities=new Set(p.st.priorities);
  document.getElementById('prSlider').value=state.practice;
  updateAll();
}
function toggleMod(id){ state.excluded.has(id)?state.excluded.delete(id):state.excluded.add(id); updateAll(); }

// ---------------- PROMPT ----------------
function buildPrompt(){
  const parts=[];
  // audience
  if(state.audience!==DEFAULTS.audience){
    if(state.audience==='beginner')
      parts.push('대상은 **완전 초보 재무팀 실무자** 기준으로. 설치·기초 개념 모듈(필수 프로그램 설치, PRD 개념, Git/GitHub, API 개념, SQL 소개)을 더 자세히 풀고, 고급 모듈(CCG 멀티모델, SAP OData, Embedding·RAG, Next.js, Playwright E2E)은 개요 수준으로 축소.');
    else
      parts.push('대상은 **개발 경험이 있는 실무자** 기준으로. 설치·기초 모듈은 빠르게 넘기고, 고급 모듈(CCG 멀티모델, SAP OData, Embedding·RAG, Next.js, Playwright E2E)에 시간을 더 배분.');
  }
  // pace
  if(state.pace!==DEFAULTS.pace){
    if(state.pace==='intensive') parts.push('페이스는 **집중형** — 각 모듈을 압축하고 군더더기 설명을 줄여 밀도를 높일 것.');
    else parts.push('페이스는 **여유형** — 각 모듈에 시간 여유를 두고 천천히, 막히는 지점을 충분히 다룰 것.');
  }
  // practice
  if(state.practice!==DEFAULTS.practice){
    if(state.practice>=70) parts.push(`실습 비중을 **${state.practice}%**로 높여 이론 설명은 최소화하고 손으로 따라하는 실습 위주로 재구성.`);
    else if(state.practice<=40) parts.push(`이론·개념 설명 비중을 높여(실습 ${state.practice}%) 왜 그렇게 하는지 배경을 먼저 탄탄히 다룰 것.`);
    else parts.push(`실습 비중 약 ${state.practice}%로 이론과 실습 균형.`);
  }
  // excluded modules
  if(state.excluded.size){
    const fully = SESSIONS.filter(s=>s.mods.every(m=>state.excluded.has(m.id)));
    const fullyIds = new Set(fully.flatMap(s=>s.mods.map(m=>m.id)));
    const partial = [...state.excluded].filter(id=>!fullyIds.has(id))
      .map(id=>{const m=ALLMODS.find(x=>x.id===id); return `${id} ${m.nm}`;});
    if(fully.length) parts.push(`다음 회차는 이번 커리큘럼에서 통째로 제외: ${fully.map(s=>s.t.split(' · ')[0]).join(', ')}.`);
    if(partial.length) parts.push(`다음 모듈은 제외하고 그 시간을 남은 모듈에 재분배: ${partial.join(', ')}.`);
  }
  // emphasis from time deltas
  const heavy = SESSIONS.filter(s=>!s.mods.every(m=>state.excluded.has(m.id)) && sessionTotal(s)-120>15)
    .map(s=>s.t.split(' · ')[0]);
  if(heavy.length) parts.push(`${heavy.join(', ')}에 시간을 더 배분(목표 분량 초과분 허용).`);
  // priorities
  if(state.priorities.size)
    parts.push(`최우선 확보 산출물: ${[...state.priorities].join(', ')} — 이 산출물로 이어지는 모듈은 절대 줄이지 말 것.`);

  const header = 'docs/prd/humax-lecture-plan-v2.md 강의 계획을 아래 방향으로 수정해줘.';
  const footer = parts.some(p=>p.includes('통째로 제외'))
    ? '남는 회차는 각 2시간(120분)을 유지하고 모듈별 시간 배분을 재계산해서 표를 갱신해줘.'
    : '각 회차 2시간(120분) 총량은 유지하고, 모듈별 시간 배분을 재조정해서 회차 요약표·산출물표까지 일관되게 갱신해줘.';

  if(!parts.length)
    return header+'\n\n(현재 기본값 그대로 — 컨트롤을 조정하면 구체적 수정 지시가 여기에 생성됩니다.)\n\n'+footer;
  return header+'\n\n'+parts.map(p=>'- '+p).join('\n')+'\n\n'+footer;
}

// ---------------- WIRE ----------------
function updateAll(){
  renderSeg('audSeg',AUD,'audience');
  renderSeg('paceSeg',PACE,'pace');
  document.getElementById('prVal').textContent=state.practice+'%';
  renderModlist(); renderChips();
  renderBoard();
  document.getElementById('out').textContent=buildPrompt();
}
document.getElementById('prSlider').addEventListener('input',e=>{ state.practice=+e.target.value; updateAll(); });
document.getElementById('copyBtn').addEventListener('click',()=>{
  navigator.clipboard.writeText(buildPrompt()).then(()=>{
    const b=document.getElementById('copyBtn'); b.textContent='복사됨!'; b.classList.add('done');
    setTimeout(()=>{b.textContent='프롬프트 복사'; b.classList.remove('done');},1400);
  });
});

renderPresets();
updateAll();
</script>
